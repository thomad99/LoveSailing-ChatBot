<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sailing Chatbot</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f8ff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    .logo-container {
      background-color: #020053;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 0;
    }
    
    .logo-container img {
      max-width: 350px;
      height: auto;
    }
    
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
      width: 100%;
      box-sizing: border-box;
    }
    
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 10px 10px 0 0;
      min-height: 400px;
    }
    
    .message {
      margin-bottom: 15px;
      border-radius: 10px;
      padding: 12px;
      max-width: 85%;
      position: relative;
    }
    
    .message:after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      transform: rotate(45deg);
      bottom: -6px;
    }
    
    .message ul {
      margin: 5px 0 5px 0;
      padding-left: 20px;
    }
    
    .message li {
      margin: 5px 0;
      list-style-type: disc;
    }
    
    .message table {
      border-collapse: collapse;
      margin: 10px 0;
      width: 100%;
    }
    
    .message table th, 
    .message table td {
      border: 1px solid #ddd;
      padding: 6px;
      text-align: left;
    }
    
    .message table th {
      background-color: #f0f0f0;
      font-weight: bold;
    }
    
    .message table tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    
    .message pre {
      background-color: #f0f0f0;
      padding: 10px;
      border-radius: 5px;
      overflow-x: auto;
      margin: 10px 0;
    }
    
    .message code {
      font-family: monospace;
      background-color: rgba(0, 0, 0, 0.05);
      padding: 2px 4px;
      border-radius: 3px;
    }
    
    .message strong {
      font-weight: bold;
      color: #004080;
    }
    
    .message strong.name {
      background-color: rgba(0, 64, 128, 0.1);
      padding: 0 3px;
      border-radius: 3px;
      font-weight: bold;
      color: #004080;
    }
    
    .user-message {
      background-color: #e6f7ff;
      margin-left: auto;
      border-bottom-right-radius: 0;
    }
    
    .user-message:after {
      background-color: #e6f7ff;
      right: 10px;
    }
    
    .bot-message {
      background-color: #f0f0f0;
      margin-right: auto;
      border-bottom-left-radius: 0;
    }
    
    .bot-message:after {
      background-color: #f0f0f0;
      left: 10px;
    }
    
    .message-content {
      word-break: break-word;
    }
    
    .message-content p {
      margin: 0 0 10px 0;
    }
    
    .message-content p:last-child {
      margin-bottom: 0;
    }
    
    .chat-input {
      display: flex;
      padding: 10px;
      background-color: #f0f0f0;
      border-radius: 0 0 10px 10px;
      border: 1px solid #ddd;
      border-top: none;
    }
    
    #userInput {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      margin-right: 10px;
    }
    
    #sendButton {
      padding: 10px 20px;
      background-color: #004080;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    
    #sendButton:hover {
      background-color: #00305f;
    }
    
    .typing-indicator {
      display: none;
      padding: 10px;
      background-color: #f0f0f0;
      border-radius: 10px;
      margin-bottom: 15px;
      max-width: 85%;
      margin-right: auto;
    }
    
    .typing-indicator span {
      display: inline-block;
      width: 10px;
      height: 10px;
      background-color: #888;
      border-radius: 50%;
      margin-right: 5px;
      animation: typing 1s infinite;
    }
    
    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }
    
    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }
    
    @keyframes typing {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
    
    @media (max-width: 600px) {
      .container {
        padding: 10px;
      }
      
      .logo-container img {
        max-width: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="img/LoveSailing-Wide.jpg" alt="LoveSailing.AI" onerror="this.onerror=''; this.src='https://img.icons8.com/fluency/96/sail-boat.png';">
  </div>
  
  <div class="container">
    <div class="chat-messages" id="chatMessages">
      <!-- Messages will be added here dynamically -->
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Ask me about sailing competitions...">
      <button id="sendButton">Send</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const chatMessages = document.getElementById('chatMessages');
      const userInput = document.getElementById('userInput');
      const sendButton = document.getElementById('sendButton');
      const typingIndicator = document.getElementById('typingIndicator');
      
      // Add event listener for the send button
      sendButton.addEventListener('click', function() {
        sendMessage();
      });
      
      // Add event listener for the enter key
      userInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault(); // Prevent default to avoid new line in input
          sendMessage();
        }
      });
      
      // Function to send a message
      function sendMessage() {
        const message = userInput.value.trim();
        
        if (message === '') return;
        
        // Add user message to chat
        addMessageToChat(message, true);
        
        // Clear input
        userInput.value = '';
        
        // Show typing indicator
        typingIndicator.style.display = 'flex';
        
        // Send message to server
        fetchBotResponse(message);
      }
      
      // Function to add message to the chat
      function addMessageToChat(content, isUser = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        
        const messageContent = document.createElement('div'); // Change from p to div for better flexibility
        messageContent.className = 'message-content';
        
        // Format the content
        let formattedContent = content;
        
        if (!isUser) {
          // Convert bullet points
          formattedContent = formattedContent.replace(/•\s*(.*?)(\n|$)/g, '<li>$1</li>');
          
          // Wrap bullet point lists in <ul> tags
          if (formattedContent.includes('<li>')) {
            formattedContent = formattedContent.replace(/(<li>.*?<\/li>)+/gs, '<ul>$&</ul>');
          }
          
          // Handle bold text (wrapped in ** or marked as headers)
          formattedContent = formattedContent.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
          
          // Make sailor names bold in responses
          formattedContent = formattedContent.replace(/([A-Z][a-z]+ [A-Z][a-z]+)/g, '<strong class="name">$1</strong>');
          
          // Make search results more readable
          formattedContent = formattedContent.replace(/(Club|Races|Points|Club Rating):/g, '<strong>$1:</strong>');
          
          // Preserve whitespace and line breaks
          formattedContent = formattedContent.replace(/\n\n/g, '<br><br>');
          formattedContent = formattedContent.replace(/\n/g, '<br>');
        }
        
        messageContent.innerHTML = formattedContent;
        messageContent.style.whiteSpace = 'pre-wrap';
        messageDiv.appendChild(messageContent);
        
        chatMessages.appendChild(messageDiv);
        
        // Scroll to bottom
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }
      
      // Function to fetch bot response from server
      async function fetchBotResponse(message) {
        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ query: message }),
          });
          
          const data = await response.json();
          
          // Hide typing indicator
          typingIndicator.style.display = 'none';
          
          // Add bot response
          addMessageToChat(data.response);
          
        } catch (error) {
          console.error('Error:', error);
          
          // Hide typing indicator
          typingIndicator.style.display = 'none';
          
          // Add error message
          addMessageToChat('Sorry, I encountered an error. Please try again.');
        }
      }

      // When the page loads, add the welcome message
      window.addEventListener('DOMContentLoaded', () => {
        const welcomeMessage = `Welcome to LoveSailing.AI ChatBot, how can I help?`;
        
        addMessageToChat(welcomeMessage);
        
        // Hide typing indicator initially
        typingIndicator.style.display = 'none';
      });
    });
  </script>
</body>
</html>
